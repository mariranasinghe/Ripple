<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ripple">
<meta name="theme-color" content="#0f1a2e">
<link rel="manifest" href="manifest.json">
<title>Ripple</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap');
/* Offline-safe system fallbacks applied immediately, web fonts enhance once loaded */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f1a2e;--bg2:#162236;--bg3:#1d2d45;--bg4:#243452;
  --surface:#1a2840;--surface2:#202f4a;
  --ink:#f0ede8;--ink2:#a8b4c8;--ink3:#637080;
  --accent:#4f9cf0;--accent-dim:#1a3a6a;
  --green:#3dd68c;--green-dim:#0f3d26;--green-t:#2ab873;
  --amber:#f5a623;--amber-dim:#3d2a08;--amber-t:#e09620;
  --red:#f0514f;--red-dim:#3d1212;--red-t:#d94040;
  --purple:#9b6fff;--purple-dim:#2a1a4d;--purple-t:#8a5ff0;
  --border:rgba(240,237,232,.07);--border2:rgba(240,237,232,.15);
  --r:10px;--rl:16px;
  --fh:'Syne',system-ui,sans-serif;
  --fb:'Inter',system-ui,sans-serif;
  --fm:'DM Mono','Courier New',monospace;
}
html,body{height:100%;background:var(--bg);font-family:var(--fb);color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
#app{max-width:430px;margin:0 auto;min-height:100vh;}

/* spinner */
.spin-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;}
.spinner{width:28px;height:28px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:13px;color:var(--ink3);font-family:var(--fm);}

/* custom confirm modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,10,20,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:24px;width:100%;max-width:320px;}
.modal-title{font-family:var(--fh);font-size:17px;font-weight:700;color:var(--ink);margin-bottom:8px;}
.modal-msg{font-size:14px;color:var(--ink2);line-height:1.5;margin-bottom:20px;}
.modal-btns{display:flex;gap:8px;}
.modal-cancel{flex:1;padding:11px;border:1px solid var(--border2);border-radius:var(--r);background:none;color:var(--ink2);font-size:14px;cursor:pointer;font-family:var(--fb);}
.modal-ok{flex:1;padding:11px;border:none;border-radius:var(--r);background:var(--red-dim);color:var(--red-t);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--fb);}
.modal-ok.safe{background:var(--accent-dim);color:var(--accent);}

/* saving overlay */
.saving-bg{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;background:rgba(15,26,46,.6);}

/* auth */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-start;padding:env(safe-area-inset-top,0px) 24px 32px;padding-top:max(env(safe-area-inset-top,0px),40px);}
.auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.auth-mark{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:24px;}
.auth-word{font-family:var(--fh);font-size:30px;font-weight:800;color:var(--ink);}
.auth-tag{font-size:14px;color:var(--ink3);margin-bottom:36px;line-height:1.6;}
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:24px;}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.auth-tab{flex:1;padding:9px;font-size:13px;color:var(--ink3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--fb);margin-bottom:-1px;}
.auth-tab.on{color:var(--ink);border-bottom-color:var(--accent);font-weight:500;}
.field{margin-bottom:14px;}
.fl{font-size:11px;font-weight:500;color:var(--ink3);margin-bottom:5px;display:block;font-family:var(--fm);text-transform:uppercase;letter-spacing:.5px;}
.fi{width:100%;font-size:15px;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--ink);font-family:var(--fb);-webkit-appearance:none;appearance:none;}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,156,240,.15);}
textarea.fi{resize:none;height:88px;line-height:1.55;}
select.fi{appearance:none;-webkit-appearance:none;}
.btn-p{width:100%;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fh);margin-top:4px;}
.btn-p:active{opacity:.85;}
.auth-note{font-size:12px;color:var(--ink3);text-align:center;margin-top:14px;line-height:1.6;}
.auth-err{font-size:13px;color:var(--red-t);background:var(--red-dim);padding:10px 12px;border-radius:var(--r);margin-bottom:14px;border:1px solid rgba(240,81,79,.2);}

/* topbar */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 18px 10px;position:sticky;top:0;z-index:50;}
.topbar-in{display:flex;align-items:center;justify-content:space-between;}
.t-brand{display:flex;align-items:center;gap:8px;}
.t-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.t-name{font-family:var(--fh);font-size:18px;font-weight:800;color:var(--ink);}
.t-sub{font-size:10px;color:var(--ink3);font-family:var(--fm);}
.t-right{display:flex;align-items:center;gap:8px;}
.new-btn{background:var(--accent);color:#fff;border:none;font-family:var(--fh);font-size:13px;font-weight:700;padding:7px 15px;border-radius:20px;cursor:pointer;}
.new-btn:active{opacity:.85;}
.icon-btn{background:var(--bg3);border:1px solid var(--border);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.xp-badge{background:var(--purple-dim);border:1px solid rgba(155,111,255,.3);border-radius:20px;padding:4px 10px;font-size:11px;font-family:var(--fm);color:var(--purple-t);}

/* tabs */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:49;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:10px 15px 9px;font-size:13px;color:var(--ink3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--fb);}
.tab.on{color:var(--ink);border-bottom-color:var(--accent);font-weight:500;}

/* page */
.page{padding:14px;padding-bottom:calc(68px + env(safe-area-inset-bottom, 0px));}

/* today */
.greet{font-family:var(--fh);font-size:22px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.greet-date{font-size:12px;color:var(--ink3);font-family:var(--fm);margin-bottom:14px;}
.xp-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;}
.xp-lv-name{font-family:var(--fh);font-size:17px;font-weight:800;color:var(--ink);margin-bottom:2px;}
.xp-lv-sub{font-size:12px;color:var(--ink3);font-family:var(--fm);margin-bottom:10px;}
.xp-track{height:10px;background:var(--bg3);border-radius:6px;overflow:hidden;margin-bottom:6px;}
.xp-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--purple),var(--accent));transition:width .4s ease;}
.xp-row{display:flex;justify-content:space-between;align-items:center;}
.xp-pts-lbl{font-size:11px;color:var(--ink3);font-family:var(--fm);}
.xp-next-lbl{font-size:11px;color:var(--purple-t);font-family:var(--fm);font-weight:600;}

.quote-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--rl);padding:13px 16px;margin-bottom:12px;}
.quote-text{font-size:13px;color:var(--ink2);line-height:1.55;font-style:italic;margin-bottom:5px;}
.quote-author{font-size:11px;color:var(--ink3);font-family:var(--fm);text-align:right;}
.sum-row{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px;margin-bottom:12px;}
.sum-stat{flex:1;text-align:center;}
.sum-num{font-family:var(--fh);font-size:22px;font-weight:700;color:var(--ink);}
.sum-lbl{font-size:10px;color:var(--ink3);font-family:var(--fm);text-transform:uppercase;margin-top:2px;}
.sum-div{width:1px;background:var(--border);margin:0 4px;}
.wk-strip{display:flex;gap:6px;margin-bottom:12px;}
.wk-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.wk-lbl{font-size:10px;color:var(--ink3);font-family:var(--fm);font-weight:500;}
.wk-dot{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--fm);color:var(--ink3);cursor:pointer;transition:transform .1s;}
.wk-dot:active{transform:scale(.9);}
.wk-dot.wk-sel{box-shadow:0 0 0 2px var(--accent);}
.wk-dot.wk-full{background:var(--green-dim);border-color:var(--green-t);color:var(--green-t);}
.wk-dot.wk-part{background:var(--amber-dim);border-color:var(--amber-t);color:var(--amber-t);}
.wk-dot.wk-today{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.wk-dot.wk-today.wk-full{background:var(--green-dim);border-color:var(--accent);color:var(--green-t);}
.mood-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:14px;margin-bottom:12px;}
.mood-lbl{font-size:11px;color:var(--ink3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.mood-q{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:10px;}
.mood-row{display:flex;gap:6px;}
.mood-btn{flex:1;padding:9px 2px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;font-size:18px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mood-btn span{font-size:9px;color:var(--ink3);font-family:var(--fm);}
.mood-btn.sel{border-color:var(--accent);background:var(--accent-dim);}
.mood-done{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green-t);}
.sec-hdr{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;font-family:var(--fm);display:flex;justify-content:space-between;align-items:center;}
.hbit{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.hbit:active{transform:scale(.99);}
.hbit.done{opacity:.55;}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chk.done{background:var(--green);border-color:var(--green);}
.chk-info{flex:1;min-width:0;}
.chk-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3;}
.hbit.done .chk-name{text-decoration:line-through;color:var(--ink3);}
.chk-meta{font-size:11px;color:var(--ink3);font-family:var(--fm);margin-top:2px;display:flex;align-items:center;gap:6px;}
.stk-badge{background:var(--amber-dim);color:var(--amber-t);padding:1px 6px;border-radius:8px;font-size:10px;}
.stk-badge.hot{background:var(--red-dim);color:var(--red-t);}

/* experiment cards */
.exp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:9px;cursor:pointer;}
.exp-card:active{transform:scale(.99);}
.exp-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.exp-name{font-family:var(--fh);font-size:15px;font-weight:700;line-height:1.3;color:var(--ink);}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;font-family:var(--fm);}
.b-act{background:var(--green-dim);color:var(--green-t);}
.b-done{background:var(--accent-dim);color:var(--accent);}
.b-pause{background:var(--bg3);color:var(--ink3);}
.exp-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:7px;}
.m-item{font-size:11px;color:var(--ink3);font-family:var(--fm);}
.stk-row{display:flex;align-items:center;gap:5px;margin-top:6px;}
.stk-it{display:flex;align-items:center;gap:3px;font-size:11px;font-family:var(--fm);color:var(--ink3);}
.pills{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--fm);}
.ph{background:var(--green-dim);color:var(--green-t);}
.pm{background:var(--amber-dim);color:var(--amber-t);}
.pl{background:var(--red-dim);color:var(--red-t);}
.pn{background:var(--bg3);color:var(--ink3);}
.pbar{height:4px;background:var(--bg3);border-radius:2px;margin-top:9px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--green));}
.last-note{font-size:12px;color:var(--ink2);line-height:1.5;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.empty{text-align:center;padding:52px 24px;}
.empty-ico{font-size:44px;margin-bottom:12px;}
.empty-ttl{font-family:var(--fh);font-size:19px;font-weight:700;margin-bottom:7px;color:var(--ink);}
.empty-sub{font-size:14px;color:var(--ink3);line-height:1.6;}

/* detail */
.d-back{font-size:13px;color:var(--ink2);background:none;border:none;cursor:pointer;padding:12px 18px 8px;display:flex;align-items:center;gap:5px;font-family:var(--fb);}
.d-hero{padding:6px 18px 16px;border-bottom:1px solid var(--border);}
.d-name{font-family:var(--fh);font-size:21px;font-weight:700;line-height:1.3;margin-bottom:5px;color:var(--ink);}
.d-by{font-size:12px;color:var(--ink3);font-family:var(--fm);margin-bottom:9px;}
.d-hyp{font-size:14px;color:var(--ink2);line-height:1.6;font-style:italic;padding:11px;background:var(--bg3);border-radius:var(--r);margin-bottom:9px;border-left:3px solid var(--accent);}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--ink2);font-family:var(--fm);border:1px solid var(--border);}
.sec{padding:14px 18px;border-bottom:1px solid var(--border);}
.sec-lbl{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;font-family:var(--fm);}
.imp-row{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--bg3);border-radius:var(--r);margin-bottom:5px;border:1px solid var(--border);}
.imp-key{font-size:13px;font-weight:500;color:var(--ink);}
.stk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:4px;}
.stk-box{background:var(--bg3);border-radius:var(--r);padding:9px 10px;text-align:center;border:1px solid var(--border);}
.stk-num{font-family:var(--fh);font-size:19px;font-weight:700;color:var(--ink);}
.stk-lbl{font-size:10px;color:var(--ink3);font-family:var(--fm);margin-top:2px;}
.log-entry{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px;margin-bottom:7px;}
.log-date{font-size:11px;color:var(--ink3);font-family:var(--fm);margin-bottom:4px;}
.log-note{font-size:13px;color:var(--ink);line-height:1.5;margin-bottom:7px;}
.add-log{width:100%;padding:10px;border:1.5px dashed var(--border2);border-radius:var(--r);background:none;color:var(--ink3);font-size:13px;cursor:pointer;font-family:var(--fb);margin-top:3px;}
.act-row{display:flex;gap:7px;padding:14px 18px;flex-wrap:wrap;}
.btn-o{flex:1;padding:10px;border:1px solid var(--border2);border-radius:var(--r);background:none;color:var(--ink);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fb);text-align:center;min-width:64px;}
.btn-o:active{opacity:.8;}
.bg{background:var(--green-dim);color:var(--green-t);border-color:transparent;}
.ba{background:var(--amber-dim);color:var(--amber-t);border-color:transparent;}
.br{background:var(--red-dim);color:var(--red-t);border-color:transparent;}
.bb{background:var(--accent-dim);color:var(--accent);border-color:transparent;}
.no-logs{text-align:center;padding:24px;color:var(--ink3);font-size:13px;font-style:italic;}

/* insights */
.stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-bottom:14px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center;}
.stat-n{font-size:22px;font-weight:700;font-family:var(--fh);line-height:1;color:var(--ink);}
.stat-l{font-size:10px;color:var(--ink3);margin-top:3px;font-family:var(--fm);text-transform:uppercase;}
.ins-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:9px;}
.ins-lbl{font-size:11px;color:var(--ink3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.ins-val{font-family:var(--fh);font-size:26px;font-weight:700;color:var(--accent);}
.ins-sub{font-size:12px;color:var(--ink3);margin-top:3px;}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.bar-lbl{font-size:11px;color:var(--ink2);width:86px;flex-shrink:0;font-family:var(--fm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:7px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));}
.bar-val{font-size:11px;color:var(--ink3);font-family:var(--fm);width:18px;text-align:right;}
.wk-ins{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:9px;}
.wk-ins-ttl{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;}
.wk-bars{display:flex;gap:4px;align-items:flex-end;height:70px;}
.wk-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.wk-bar{width:100%;border-radius:3px;background:var(--bg3);min-height:3px;}
.wk-bar-lbl{font-size:9px;color:var(--ink3);font-family:var(--fm);}
.bsc{background:linear-gradient(135deg,var(--purple-dim),var(--accent-dim));border:1px solid rgba(155,111,255,.2);border-radius:var(--rl);padding:14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;}
.bsc-n{font-family:var(--fh);font-size:26px;font-weight:800;color:var(--ink);}
.bsc-l{font-size:12px;color:var(--ink3);}
.mood-hist{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;}
.mood-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--bg3);border:1px solid var(--border);}

/* overlay / sheet */
.overlay{position:fixed;inset:0;background:rgba(5,10,20,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;padding:0 18px 44px;border-top:1px solid var(--border2);-webkit-overflow-scrolling:touch;}
.handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 18px;}
.sheet-ttl{font-family:var(--fh);font-size:19px;font-weight:700;margin-bottom:18px;color:var(--ink);}

/* ══════ STORAGE — localStorage only, works offline ══════ */
const STORE_KEY='ripple_v2';
function loadDB(username){
  try{
    const raw=localStorage.getItem(STORE_KEY+'_'+username);
    return raw?JSON.parse(raw):null;
  }catch(e){return null;}
}
function saveDB(username,data){
  try{localStorage.setItem(STORE_KEY+'_'+username,JSON.stringify(data));return true;}
  catch(e){
    // Storage full or blocked — show warning toast if app is running
    if(typeof toast==='function')toast('⚠️ Could not save — storage full or blocked');
    return false;
  }
}
function loadUsers(){
  try{return JSON.parse(localStorage.getItem(STORE_KEY+'_users')||'{}');}catch(e){return{};}
}
function saveUsers(u){

}
function loadSess(){

}
function saveSess(u,dn){

function getWeeklyChallenge(){
  const weekNum=Math.floor(Date.now()/(7*24*3600*1000));
  return WEEKLY_CHALLENGES[weekNum%WEEKLY_CHALLENGES.length];
}

function getChallengeProgress(ch){
  const wk=getWeekDates(0);
  const acts=DB.experiments.filter(e=>e.status==='active');
  if(ch.type==='checkins_this_week'){
    const days=wk.filter(d=>acts.some(e=>(e.checkIns||[]).includes(d)));
    return Math.min(days.length,ch.goal);
  }
  if(ch.type==='multi_same_day'){
    let best=0;
    wk.forEach(d=>{
      const c=acts.filter(e=>(e.checkIns||[]).includes(d)).length;
      if(c>best)best=c;
    });
    return Math.min(best,ch.goal);
  }
  if(ch.type==='mood_streak'||ch.type==='mood_this_week'){
    const days=wk.filter(d=>(DB.moodHistory||[]).some(m=>m.date===d));
    return Math.min(days.length,ch.goal);
  }
  if(ch.type==='logs_this_week'){
    const logs=DB.experiments.reduce((t,e)=>t+(e.logs||[]).filter(l=>wk.includes(l.date)).length,0);
    return Math.min(logs,ch.goal);
  }
  if(ch.type==='streak_5'){
    const best=acts.reduce((b,e)=>{const s=calcStreak(e);return s.current>b?s.current:b;},0);
    return Math.min(best,ch.goal);
  }
  if(ch.type==='full_week'){
    const full=wk.filter(d=>d<=today()&&acts.length>0&&acts.every(e=>(e.checkIns||[]).includes(d)));
    return Math.min(full.length,ch.goal);
  }
  if(ch.type==='active_count'){
    return Math.min(acts.length,ch.goal);
  }
  return 0;
}

async function fetchAIInsight(){
  const card=document.getElementById('ai-insight-body');
  if(!card)return;
  card.innerHTML='<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span style="margin-left:4px">Analysing your habits…</span></div>';

  const acts=DB.experiments.filter(e=>e.status==='active');
  const streaks=acts.map(e=>({name:e.name,streak:calcStreak(e).current,checkins:(e.checkIns||[]).length}));
  const mood=(DB.moodHistory||[]).slice(-7).map(m=>MOODS[m.score].l);
  const xp=calcXP(DB);

  const prompt=`You are a supportive habit coach. Here is a user's habit data:
Active experiments: ${JSON.stringify(streaks)}
Recent moods (last 7 days): ${mood.join(', ')||'none logged'}
Total XP: ${xp}
Total check-ins: ${acts.reduce((t,e)=>t+(e.checkIns||[]).length,0)}

Write a SHORT (2-3 sentences max), warm, personal insight about their progress. Be specific about what's working or what they could try. No bullet points, no headers, just conversational encouragement.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:150,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'Keep going — every check-in counts!';
    card.innerHTML='<div class="ai-body">'+text+'</div><span class="ai-refresh" onclick="fetchAIInsight()">↻ Refresh</span>';
  }catch(e){
    card.innerHTML='<div class="ai-body">Keep showing up — consistency is the real secret to change.</div><span class="ai-refresh" onclick="fetchAIInsight()">↻ Refresh</span>';
  }
}

function getMonthlyReview(){
  const now=new Date();
  const yr=now.getFullYear();
  const mo=now.getMonth();
  const firstDay=new Date(yr,mo,1);
  const today_d=today();
  // All dates in current month up to today
  const monthDates=[];
  for(let d=new Date(firstDay);d<=now;d.setDate(d.getDate()+1)){
    const s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(s<=today_d)monthDates.push(s);
  }
  const all=DB.experiments;
  const totalCI=all.reduce((t,e)=>t+(e.checkIns||[]).filter(d=>monthDates.includes(d)).length,0);
  const activeDays=monthDates.filter(d=>all.some(e=>(e.checkIns||[]).includes(d))).length;
  const totalLogs=all.reduce((t,e)=>t+(e.logs||[]).filter(l=>monthDates.includes(l.date)).length,0);
  const moods=(DB.moodHistory||[]).filter(m=>monthDates.includes(m.date));
  const avgMood=moods.length?Math.round(moods.reduce((s,m)=>s+m.score,0)/moods.length):null;
  // Best experiment this month
  const best=all.map(e=>({name:e.name,ci:(e.checkIns||[]).filter(d=>monthDates.includes(d)).length}))
    .sort((a,b)=>b.ci-a.ci)[0];
  const monthName=now.toLocaleDateString('en-US',{month:'long'});
  return{monthName,totalCI,activeDays,totalLogs,avgMood,best,days:monthDates.length};
}

/* ══════ UTILS ══════ */
// UTC-safe local date string YYYY-MM-DD
function localDateStr(d=new Date()){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const today=()=>localDateStr();
const uid=()=>Date.now()+''+Math.floor(Math.random()*9999);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const slug=s=>s.toLowerCase().trim().replace(/[^a-z0-9]/g,'_').slice(0,32);
const daysSince=d=>{if(!d)return 0;const a=new Date(d+'T00:00:00');const b=new Date(today()+'T00:00:00');return Math.max(0,Math.round((b-a)/86400000));};
const pct=e=>Math.min(100,Math.round(daysSince(e.startDate)/(e.targetDays||1)*100));
const mcls=v=>({high:'ph',mid:'pm',low:'pl',none:'pn'}[v]||'pn');
const rcls=v=>({high:'rh',mid:'rm',low:'rl',none:'rn'}[v]||'');
function hashPin(p){let h=5381;for(let i=0;i<p.length;i++)h=((h<<5)+h)^p.charCodeAt(i);return(h>>>0).toString(16);}
function pillsHtml(m){return['mood','productivity','focus'].map(k=>{const v=(m&&m[k])||'none';return`<span class="pill ${mcls(v)}">${MA[v]} ${k[0].toUpperCase()+k.slice(1)}</span>`;}).join('');}
function badgeHtml(s){const c={active:'b-act',complete:'b-done',paused:'b-pause'}[s]||'b-pause';return`<span class="badge ${c}">${s}</span>`;}
function getLevel(xp){let lv=LEVELS[0];for(const l of LEVELS){if(xp>=l.x)lv=l;}return lv;}
function getNextLv(xp){for(const l of LEVELS){if(xp<l.x)return l;}return null;}

/* UTC-safe daysBetween using local date strings */
function daysBetween(a,b){
  const da=new Date(a+'T00:00:00');
  const db=new Date(b+'T00:00:00');
  return Math.abs(Math.round((db-da)/86400000));
}

function calcStreak(exp){
  if(!exp.checkIns||!exp.checkIns.length)return{current:0,longest:0};
  const dates=[...new Set(exp.checkIns)].sort();
  const t=today();
  const rev=[...dates].reverse();
  let cur=0;
  for(let i=0;i<rev.length;i++){
    if(i===0){if(rev[i]===t||daysBetween(rev[i],t)===1)cur=1;else break;}
    else{if(daysBetween(rev[i],rev[i-1])===1)cur++;else break;}
  }
  let longest=0,run=1;
  for(let i=1;i<dates.length;i++){
    if(daysBetween(dates[i-1],dates[i])===1)run++;
    else{if(run>longest)longest=run;run=1;}
  }
  if(run>longest)longest=run;
  return{current:cur,longest:Math.max(longest,cur)};
}

function checkedToday(exp){return(exp.checkIns||[]).includes(today());}

function getWeekDates(offsetWeeks=0){
  const d=new Date();
  d.setDate(d.getDate()+(offsetWeeks*7));
  const day=d.getDay();
  const mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return localDateStr(dd);});
}

function getGreeting(){
  const h=new Date().getHours();
  return h<12?'Good morning':h<17?'Good afternoon':'Good evening';
}

function calcXP(db){
  let xp=0;
  for(const e of db.experiments){
    xp+=e.logs.length*5;
    xp+=(e.checkIns||[]).length*10;
    const s=calcStreak(e);xp+=s.longest*2;
    if(e.status==='complete')xp+=30;
  }
  xp+=(db.moodHistory||[]).length*3;
  return xp;
}

function needCheckIn(db){return db.experiments.filter(e=>e.status==='active'&&!checkedToday(e));}

/* Custom confirm — replaces native confirm() which breaks in iOS PWA */
function rippleConfirm(msg,onOk,{okLabel='Delete',safe=false}={}){
  const bg=document.createElement('div');bg.className='modal-bg';
  const cancelBtn=document.createElement('button');
  cancelBtn.className='modal-cancel';cancelBtn.textContent='Cancel';
  const okBtn=document.createElement('button');
  okBtn.className='modal-ok '+(safe?'safe':'');okBtn.textContent=okLabel;
  const modal=document.createElement('div');modal.className='modal';
  modal.innerHTML=`<div class="modal-title">Are you sure?</div><div class="modal-msg">${esc(msg)}</div>`;
  const btns=document.createElement('div');btns.className='modal-btns';
  btns.appendChild(cancelBtn);btns.appendChild(okBtn);
  modal.appendChild(btns);bg.appendChild(modal);
  document.body.appendChild(bg);
  cancelBtn.onclick=()=>bg.remove();
  okBtn.onclick=()=>{bg.remove();onOk();};
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
}

/* ══════ AUTH ══════ */
function doLogin(){
  const uRaw=document.getElementById('lu')?.value||'';
  const pRaw=document.getElementById('lp')?.value||'';
  // Trim whitespace and normalise to lowercase so iOS autocapitalise doesn't break login
  const u=uRaw.trim().toLowerCase();
  const p=pRaw.trim();
  if(!u||!p){showAuthErr('Please fill in all fields.');return;}
  // Check localStorage is available
  if(!storageAvailable()){showAuthErr('Storage unavailable. Please enable cookies/storage for this site in Safari Settings.');return;}
  const users=loadUsers();
  // Try exact match first, then lowercase match for backwards compat
  const matchKey=users[u]?u:Object.keys(users).find(k=>k.toLowerCase()===u);
  if(!matchKey){showAuthErr('Username not found. Check your username or create an account.');return;}
  if(users[matchKey].pinHash!==hashPin(p)){showAuthErr('Incorrect PIN. Try again.');return;}
  startSession(matchKey,users[matchKey].dn);
}

function doRegister(){
  const name=document.getElementById('rn')?.value?.trim();
  const uRaw=document.getElementById('ru')?.value||'';
  // Force lowercase on register so it always matches on login
  const u=uRaw.trim().toLowerCase();
  const p=document.getElementById('rp')?.value?.trim();
  const p2=document.getElementById('rp2')?.value?.trim();
  if(!name||!u||!p){showAuthErr('Please fill in all fields.');return;}
  if(p!==p2){showAuthErr('PINs do not match.');return;}
  if(p.length<4){showAuthErr('PIN must be at least 4 characters.');return;}
  if(!/^[a-z0-9_]+$/i.test(u)){showAuthErr('Username: letters, numbers and _ only.');return;}
  // Check localStorage is available
  if(!storageAvailable()){showAuthErr('Storage unavailable. Please enable cookies/storage for this site in Safari Settings → Advanced → Website Data.');return;}
  const users=loadUsers();
  if(users[u]){showAuthErr('Username taken. Choose another.');return;}
  const userData={dn:name,pinHash:hashPin(p),created:today()};
  users[u]=userData;
  const saved=saveUsers(users);
  if(!saved){showAuthErr('Could not save account — storage may be full or blocked. Check Safari Settings → Privacy.');return;}
  saveDB(u,{experiments:[],nextId:1,moodHistory:[]});
  startSession(u,name);
}

// Test if localStorage is actually working (iOS PWA can block it)
function storageAvailable(){
  try{
    const k='__ripple_test__';
    localStorage.setItem(k,'1');
    const ok=localStorage.getItem(k)==='1';
    localStorage.removeItem(k);
    return ok;
  }catch(e){return false;}
}

function startSession(u,dn){
  USER={username:u,displayName:dn};
  DB=loadDB(u)||{experiments:[],nextId:1,moodHistory:[]};
  if(!DB.moodHistory)DB.moodHistory=[];
  saveSess(u,dn);
  S.view='today';render();
}

function doLogout(){
  rippleConfirm('Sign out of your account?',()=>{
    USER=null;DB=null;clearSess();
    S.view='auth';S.atab='login';render();
  },{okLabel:'Sign out',safe:true});
}

function persist(){
  if(!USER)return;
  saveDB(USER.username,DB);
}

function showAuthErr(msg){
  let e=document.getElementById('aerr');
  if(!e){e=document.createElement('div');e.id='aerr';e.className='auth-err';document.querySelector('.auth-card')?.prepend(e);}
  e.textContent=msg;
}

/* ══════ RENDER ══════ */
function render(){
  const app=document.getElementById('app');
  if(S.view==='auth'){app.innerHTML=renderAuth();return;}
  let html='';
  if(S.view==='today')html=renderToday();
  else if(S.view==='detail')html=renderDetail();
  else if(S.view==='insights')html=renderInsights();
  else html=renderList();
  app.innerHTML=html;
  if(S.overlay){
    const ov=document.createElement('div');ov.className='overlay';ov.id='ov';
    ov.onclick=e=>{if(e.target.id==='ov')closeOverlay();};
    const sh=document.createElement('div');sh.className='sheet';
    if(S.overlay==='log')sh.innerHTML=renderLogForm();
    else if(S.overlay==='mood')sh.innerHTML=renderMoodForm();
    else sh.innerHTML=renderExpForm();
    ov.appendChild(sh);app.appendChild(ov);
  }
}

    }
    if(!sdChecks.length&&!sdLogs.length&&!sdMood){
      out+='<div style="text-align:center;padding:20px 0;color:var(--ink3);font-size:13px">Nothing logged this day.</div>';
    }
    out+='</div>';
    return out;
  }

  // Current week: mood + experiments, or tapped-day detail
  if(isCurrentWeek){
    if(S.selectedDay&&S.selectedDay!==today()&&S.selectedDay>=wkDates[0]){
      html+=dayDetail(S.selectedDay);
    } else {
      html+='<div class="mood-box"><div class="mood-lbl">Daily check-in</div>';
      if(todMood){
        html+='<div class="mood-done">'+MOODS[todMood.score].e+' Mood: <strong>'+MOODS[todMood.score].l+'</strong><span style="margin-left:auto;font-size:11px;color:var(--ink3);cursor:pointer" onclick="openMoodForm()">change</span></div>';
      } else {
        html+='<div class="mood-q">How are you feeling?</div><div class="mood-row">';
        for(var mi=0;mi<MOODS.length;mi++){
          html+='<button class="mood-btn" onclick="quickMood('+mi+')">'+MOODS[mi].e+'<span>'+MOODS[mi].l+'</span></button>';
        }
        html+='</div>';
      }
      html+='</div>';
      if(acts.length===0){
        html+='<div class="empty" style="padding:20px"><div class="empty-ico">🌱</div><div class="empty-ttl">No active experiments</div><div class="empty-sub">Add one from the Experiments tab.</div></div>';
      } else {
        var remaining=need.length;
        html+='<div class="sec-hdr">Today\'s experiments<span style="font-size:11px;color:'+(remaining===0?'var(--green-t)':'var(--amber-t)')+'\">'+(remaining===0?'All done \u2713':remaining+' remaining')+'</span></div>';
        for(var ai=0;ai<acts.length;ai++){
          var exp=acts[ai];
          var done=checkedToday(exp);
          var streak=calcStreak(exp);
          html+='<div class="hbit '+(done?'done':'')+'\" onclick="toggleCheckIn('+exp.id+')">';
          html+='<div class="chk '+(done?'done':'')+'">'+(done?'<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><polyline points="2,6.5 5,10 11,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+'</div>';
          html+='<div class="chk-info"><div class="chk-name">'+esc(exp.name)+'</div>';
          html+='<div class="chk-meta">'+esc(exp.category)+' \u00b7 '+(exp.frequency||'daily');
          if(streak.current>0)html+=' <span class="stk-badge '+(streak.current>=7?'hot':'')+'">'+'🔥'+streak.current+'d</span>';
          html+='</div></div></div>';
        }
      }
    }

  } else {
    // Past week — selected day detail or full week summary cards
    if(S.selectedDay&&S.selectedDay<=today()&&S.selectedDay>=wkDates[0]&&S.selectedDay<=wkDates[6]){
      html+=dayDetail(S.selectedDay);
    } else {
      var hasAnyDay=false;
      var histHtml='';
      for(var hi=0;hi<wkDates.length;hi++){
        var hd=wkDates[hi];
        if(hd>today())continue;
        var hMood=(DB.moodHistory||[]).find(function(m){return m.date===hd;});
        var hChecks=DB.experiments.filter(function(e){return(e.checkIns||[]).includes(hd);});
        var hLogs=[];
        for(var ei=0;ei<DB.experiments.length;ei++){
          var exLogs=(DB.experiments[ei].logs||[]).filter(function(l){return l.date===hd;});
          for(var li=0;li<exLogs.length;li++){
            hLogs.push({note:exLogs[li].note,expName:DB.experiments[ei].name});
          }
        }
        if(!hMood&&!hChecks.length&&!hLogs.length)continue;
        hasAnyDay=true;
        var dLabel=new Date(hd+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
        histHtml+='<div class="ins-block" style="margin-bottom:9px">';
        histHtml+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        histHtml+='<div style="font-size:12px;font-weight:500;color:var(--ink)">'+dLabel+'</div>';
        if(hMood)histHtml+='<span style="font-size:16px">'+MOODS[hMood.score].e+'</span>';
        histHtml+='</div>';
        if(hChecks.length){
          histHtml+='<div style="font-size:11px;color:var(--green-t);font-family:var(--fm);margin-bottom:5px">\u2713 '+hChecks.map(function(e){return esc(e.name);}).join(' \u00b7 ')+'</div>';
        }
        for(var hli=0;hli<hLogs.length;hli++){
          histHtml+='<div class="log-entry" style="margin-bottom:5px"><div class="log-date">'+esc(hLogs[hli].expName)+'</div><div class="log-note">'+esc(hLogs[hli].note)+'</div></div>';
        }
        histHtml+='</div>';
      }
      if(hasAnyDay){
        html+=histHtml;
      } else {
        html+='<div class="empty" style="padding:28px 24px"><div class="empty-ico">📭</div><div class="empty-ttl">Nothing logged</div><div class="empty-sub">No check-ins or entries for this week.</div></div>';
      }
    }
  }
  html+=navHtml();
  return html;
}

  return`<div class="exp-card" onclick="openDetail(${exp.id})">

      ${s.longest>0?`<div class="stk-it">best: ${s.longest}d</div>`:''}

/* INSIGHTS */
function renderInsights(){
  const all=DB.experiments;
  const ci=all.reduce((a,e)=>a+(e.checkIns||[]).length,0);
  const xp=calcXP(DB);const lv=getLevel(xp);
  const best=all.reduce((b,e)=>{const s=calcStreak(e);return s.longest>b?s.longest:b;},0);
  const wkD=getWeekDates();
  const acts=all.filter(e=>e.status==='active');
  const wkC=wkD.map(d=>all.reduce((c,e)=>(e.checkIns||[]).includes(d)?c+1:c,0));
  const mxW=Math.max(...wkC,1);
  const moods=(DB.moodHistory||[]).slice(-14);
  const earned=getEarnedBadges();
  const mr=getMonthlyReview();

  var html='';
  html+='<div class="topbar"><div class="topbar-in">';
  html+='<div class="t-brand"><div class="t-mark">🌊</div><div><div class="t-name">Insights</div><div class="t-sub">@'+esc(USER.username)+'</div></div></div>';
  html+='<div class="t-right"><div class="xp-badge">⚡'+xp+' XP</div><button class="icon-btn" onclick="doLogout()">👤</button></div>';
  html+='</div></div>';
  html+='<div class="page">';

  // ── AI Insight ──────────────────────────────────────
  html+='<div class="ai-card">';
  html+='<div class="ai-header"><span style="font-size:18px">🧠</span><span class="ai-tag">AI Coach Insight</span></div>';
  html+='<div id="ai-insight-body"><div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span style="margin-left:6px;font-size:13px;color:var(--ink3)">Analysing your habits…</span></div></div>';
  html+='</div>';

  // ── Monthly Review ──────────────────────────────────
  html+='<div class="month-card">';
  html+='<div class="month-title">📅 '+mr.monthName+' so far</div>';
  html+='<div class="month-stat-row">';
  html+='<div class="month-stat"><div class="month-stat-n">'+mr.activeDays+'</div><div class="month-stat-l">Active days</div></div>';
  html+='<div class="month-stat"><div class="month-stat-n">'+mr.totalCI+'</div><div class="month-stat-l">Check-ins</div></div>';
  html+='<div class="month-stat"><div class="month-stat-n">'+mr.totalLogs+'</div><div class="month-stat-l">Notes</div></div>';
  html+='<div class="month-stat"><div class="month-stat-n">'+(mr.avgMood!==null?MOODS[mr.avgMood].e:'—')+'</div><div class="month-stat-l">Avg mood</div></div>';
  html+='</div>';
  if(mr.best&&mr.best.ci>0){
    html+='<div class="month-winner"><div class="month-winner-ico">🥇</div><div><div class="month-winner-lbl">Best experiment</div><div class="month-winner-name">'+esc(mr.best.name)+'<span style="color:var(--ink3);font-weight:400"> · '+mr.best.ci+' check-ins</span></div></div></div>';
  }
  html+='</div>';

  // ── Milestone Badges ────────────────────────────────
  html+='<div class="badges-section">';
  html+='<div class="sec-hdr" style="margin-bottom:10px">🎁 Badges <span style="font-size:11px;color:var(--ink3);text-transform:none;letter-spacing:0;font-weight:400">'+earned.length+' / '+BADGES.length+' earned</span></div>';
  html+='<div class="badges-grid">';
  for(var bi=0;bi<BADGES.length;bi++){
    var b=BADGES[bi];
    var isEarned=b.check(DB);
    html+='<div class="badge-item '+(isEarned?'earned':'locked')+'">';
    html+='<div class="badge-ico">'+b.ico+'</div>';
    html+='<div class="badge-name">'+b.name+'</div>';
    html+='<div class="badge-cond">'+b.cond+'</div>';
    html+='</div>';
  }
  html+='</div></div>';

  // ── Stats + weekly bar chart ────────────────────────
  html+='<div class="stat-grid">';
  html+='<div class="stat-box"><div class="stat-n">'+all.length+'</div><div class="stat-l">Total</div></div>';
  html+='<div class="stat-box"><div class="stat-n">'+acts.length+'</div><div class="stat-l">Active</div></div>';
  html+='<div class="stat-box"><div class="stat-n">'+ci+'</div><div class="stat-l">Check-ins</div></div>';
  html+='</div>';
  if(best>0){
    html+='<div class="bsc"><div style="font-size:30px">🔥</div><div><div class="bsc-n">'+best+' days</div><div class="bsc-l">Best streak ever</div></div></div>';
  }
  if(all.length>0){
    html+='<div class="wk-ins"><div class="wk-ins-ttl">This week</div><div class="wk-bars">';
    for(var wi=0;wi<wkD.length;wi++){
      var n=wkC[wi];
      var h=mxW>0?Math.round((n/mxW)*56)+3:3;
      var bc=n>0?(wkD[wi]===today()?'var(--accent)':'var(--green-t)'):'var(--bg3)';
      html+='<div class="wk-bar-wrap"><div class="wk-bar" style="height:'+h+'px;background:'+bc+'"></div><div class="wk-bar-lbl">'+WDAYS[wi]+'</div></div>';
    }
    html+='</div></div>';
    if(moods.length>0){
      html+='<div class="ins-block"><div class="ins-lbl" style="margin-bottom:8px">Mood — last '+moods.length+' days</div><div class="mood-hist">';
      for(var mi2=0;mi2<moods.length;mi2++){
        html+='<div class="mood-dot" title="'+moods[mi2].date+'">'+MOODS[moods[mi2].score].e+'</div>';
      }
      html+='</div></div>';
    }
  }

  html+='</div>';
  html+=navHtml();
  html+='<script>setTimeout(fetchAIInsight,100);<\/script>';
  return html;
}

function goBack(){S.view='list';S.selId=null;render();}
function closeOverlay(){S.overlay=null;render();}

/* Nested key setter: setField('metrics.mood', 'high') */
function setField(key,val){
  const parts=key.split('.');
  if(parts.length===1){S.form[key]=val;}
  else{if(!S.form[parts[0]])S.form[parts[0]]={};S.form[parts[0]][parts[1]]=val;}
}
function setLogField(key,val){
  const parts=key.split('.');
  if(parts.length===1){S.logForm[key]=val;}
  else{if(!S.logForm[parts[0]])S.logForm[parts[0]]={};S.logForm[parts[0]][parts[1]]=val;}
}

function openNewForm(){
  S.form={startDate:today(),targetDays:30,status:'active',frequency:'daily',metrics:{mood:'none',productivity:'none',focus:'none'},tags:[],category:'Health'};
  S.overlay='new';render();
}
function openEditForm(){
  S.form=JSON.parse(JSON.stringify(DB.experiments.find(e=>e.id===S.selId)));
  S.overlay='edit';render();
}
function openLogForm(){
  if(!S.selId){toast('No experiment selected');return;}
  S.logForm={date:today(),note:'',metrics:{mood:'none',productivity:'none',focus:'none'}};
  S.overlay='log';render();
}
function openMoodForm(){
  const ex=(DB.moodHistory||[]).find(m=>m.date===today());
  S.moodForm={score:ex?ex.score:-1};S.overlay='mood';render();
}

function quickMood(score){
  if(!DB.moodHistory)DB.moodHistory=[];
  const idx=DB.moodHistory.findIndex(m=>m.date===today());
  if(idx>=0)DB.moodHistory[idx].score=score;
  else DB.moodHistory.push({date:today(),score});
  persist();toast(`Mood logged: ${MOODS[score].e} ${MOODS[score].l}`);render();
}

function saveMood(){
  if(S.moodForm.score===-1||S.moodForm.score===undefined){toast('Please select a mood');return;}
  quickMood(S.moodForm.score);S.overlay=null;render();
}

function toggleCheckIn(id){
  const exp=DB.experiments.find(e=>e.id===id);if(!exp)return;
  if(!exp.checkIns)exp.checkIns=[];
  const t=today();const idx=exp.checkIns.indexOf(t);
  if(idx>=0){exp.checkIns.splice(idx,1);persist();toast('Check-in removed');render();}
  else{exp.checkIns.push(t);persist();const s=calcStreak(exp);toast(s.current>1?`🔥 ${s.current} day streak!`:'Checked in ✓');render();}
}

function saveExpForm(){
  const f=S.form;
  if(!f.name?.trim()){toast('Please enter a name');return;}
  const tags=f.tagsRaw!==undefined?f.tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):(f.tags||[]);
  const{tagsRaw:_,metrics:_m,...rest}=f;
  const metrics=f.metrics||{mood:'none',productivity:'none',focus:'none'};
  const data={...rest,tags,targetDays:parseInt(f.targetDays)||30,metrics};
  if(f.id){
    const i=DB.experiments.findIndex(e=>e.id===f.id);
    if(!data.checkIns)data.checkIns=DB.experiments[i].checkIns||[];
    if(!data.logs)data.logs=DB.experiments[i].logs||[];
    DB.experiments[i]=data;
  } else {
    data.id=DB.nextId++;data.logs=[];data.checkIns=[];
    DB.experiments.unshift(data);
  }
  persist();S.overlay=null;toast(f.id?'Updated ✓':'Experiment started! 🌊');render();
}

function saveLog(){
  const lf=S.logForm;
  if(!lf.note?.trim()){toast('Please add an observation');return;}
  const exp=DB.experiments.find(e=>e.id===S.selId);if(!exp)return;
  const metrics=lf.metrics||{mood:'none',productivity:'none',focus:'none'};
  exp.logs.push({id:uid(),date:lf.date||today(),note:lf.note.trim(),metrics});
  persist();S.overlay=null;toast('Entry saved ✓');render();
}

function markDone(id){
  rippleConfirm('Mark this experiment as complete?',()=>{
    const exp=DB.experiments.find(e=>e.id===id);if(!exp)return;
    exp.status='complete';persist();toast('Complete! 🎉 +30 XP');render();
  },{okLabel:'Mark done',safe:true});
}

function pauseExp(id){
  const exp=DB.experiments.find(e=>e.id===id);if(!exp)return;
  exp.status='paused';persist();toast('Paused');render();
}

function resumeExp(id){
  const exp=DB.experiments.find(e=>e.id===id);if(!exp)return;
  exp.status='active';persist();toast('Resumed ✓');render();
}

function deleteLog(expId,logId){
  rippleConfirm('Delete this log entry?',()=>{
    const exp=DB.experiments.find(e=>e.id===expId);if(!exp)return;
    exp.logs=exp.logs.filter(l=>l.id!==logId);
    persist();toast('Entry deleted');render();
  },{okLabel:'Delete',safe:false});
}

function deleteExp(id){
  rippleConfirm('Delete this experiment and all its logs? This cannot be undone.',()=>{
    DB.experiments=DB.experiments.filter(e=>e.id!==id);
    persist();S.view='list';S.selId=null;toast('Deleted');render();
  },{okLabel:'Delete',safe:false});
}

/* ══════ PWA SETUP ══════ */
(()=>{
  // Register external service worker (sw.js in repo root)
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }

  // iOS "Add to Home Screen" nudge (shown once, only on Safari iOS, only when not already installed)
  const isIos=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
  const hintDismissed=localStorage.getItem('ripple_ios_hint');
  if(isIos&&!isInStandalone&&!hintDismissed){
    setTimeout(()=>{
      const h=document.createElement('div');h.className='ios-hint';
      h.innerHTML=`<span>📲</span><span>Install Ripple: tap <strong>Share</strong> then <strong>Add to Home Screen</strong></span><button class="ios-hint-x" onclick="this.parentElement.remove();localStorage.setItem('ripple_ios_hint','1')">✕</button>`;
      document.body.appendChild(h);
    },2500);
  }
})();

(()=>{
  const sess=loadSess();
  if(sess?.u){startSession(sess.u,sess.dn||sess.u);return;}
  S.view='auth';render();
})();
</script>
